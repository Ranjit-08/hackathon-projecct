<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Login — HireWalk</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a class="auth-logo" href="../index.html">🚀 HireWalk</a>
    <h2>Company Login</h2>
    <p class="subtitle">Manage your walk-in interviews</p>

    <div id="alert-box"></div>

    <div class="form-group">
      <label>Email</label>
      <input class="form-control" id="email" type="email" placeholder="hr@company.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" id="password" type="password" placeholder="Your password" />
    </div>

    <button class="btn btn-primary" style="width:100%;margin-top:8px;" id="login-btn" onclick="login()">
      Login
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.875rem;color:var(--muted)">
      No account? <a href="register.html" style="color:var(--accent);font-weight:600">Register here</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  Auth.redirectIfLoggedIn();

  async function login() {
    const btn   = document.getElementById('login-btn');
    const box   = document.getElementById('alert-box');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) return showAlert(box, 'Email and password required');

    setLoading(btn, true, 'Logging in...');
    try {
      const res = await Api.companyLogin({ email, password });
      Auth.save(res.token, res.user);
      location.href = 'dashboard.html';
    } catch (err) {
      showAlert(box, err.message);
    } finally {
      setLoading(btn, false);
    }
  }

  // Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
