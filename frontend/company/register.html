<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Register — HireWalk</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a class="auth-logo" href="../index.html">🚀 HireWalk</a>
    <h2>Create Company Account</h2>
    <p class="subtitle">Start posting walk-in interviews today</p>

    <div id="alert-box"></div>

    <div class="form-group">
      <label>Company Name</label>
      <input class="form-control" id="name" type="text" placeholder="e.g. TechCorp Solutions" />
    </div>
    <div class="form-group">
      <label>Official Email</label>
      <input class="form-control" id="email" type="email" placeholder="hr@company.com" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" id="password" type="password" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input class="form-control" id="phone" type="tel" placeholder="+91 98765 43210" />
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;margin-top:8px;" id="reg-btn" onclick="register()">
      Create Account
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.875rem;color:var(--muted)">
      Already registered? <a href="login.html" style="color:var(--accent);font-weight:600">Login</a>
    </p>
    <p style="text-align:center;margin-top:8px;font-size:.875rem;color:var(--muted)">
      Are you a candidate? <a href="../user/register.html" style="color:var(--accent);font-weight:600">Register here</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  Auth.redirectIfLoggedIn();

  async function register() {
    const btn = document.getElementById('reg-btn');
    const box = document.getElementById('alert-box');
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const phone    = document.getElementById('phone').value.trim();

    if (!name || !email || !password) return showAlert(box, 'Please fill all required fields');

    setLoading(btn, true, 'Creating account...');
    try {
      const res = await Api.companyRegister({ name, email, password, phone });
      Auth.save(res.token, res.user);
      showAlert(box, 'Account created! Redirecting...', 'success');
      setTimeout(() => location.href = 'dashboard.html', 800);
    } catch (err) {
      showAlert(box, err.message);
    } finally {
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
