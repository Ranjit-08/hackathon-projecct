<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Mock Interview — HireWalk</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: #f0f4ff; }

    .mock-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 64px);
      max-width: 1200px;
      margin: 0 auto;
      gap: 0;
    }

    /* ── Sidebar ── */
    .mock-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--primary), var(--primary-mid));
      color: #fff;
    }

    .ai-avatar-large {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 12px;
    }

    .sidebar-top h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .sidebar-top p { font-size: .75rem; opacity: .65; }

    .online-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .72rem;
      color: #4ade80;
      margin-top: 8px;
      font-weight: 600;
    }

    .online-dot::before {
      content: '';
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* Mode Switcher */
    .mode-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .mode-section label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      display: block;
      margin-bottom: 8px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .mode-tab {
      padding: 9px 8px;
      border-radius: var(--radius-sm);
      font-size: .775rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      transition: all .18s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mode-tab:hover { border-color: var(--accent); color: var(--accent); }

    .mode-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Quick Prompts */
    .prompts-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex: 1;
      overflow-y: auto;
    }

    .prompts-section label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      display: block;
      margin-bottom: 8px;
    }

    .quick-prompt {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: .775rem;
      color: var(--text-mid);
      font-family: var(--font);
      cursor: pointer;
      margin-bottom: 6px;
      transition: all .18s;
      line-height: 1.4;
    }

    .quick-prompt:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    /* Stats */
    .sidebar-stats {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat-mini {
      text-align: center;
      padding: 8px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .stat-mini .val {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-mini .lbl {
      font-size: .65rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Chat Area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      background: #f8faff;
      overflow: hidden;
    }

    /* Chat Topbar */
    .chat-topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mode-badge {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .mode-badge.interview { background: #dbeafe; color: #1d4ed8; }
    .mode-badge.qa        { background: #d1fae5; color: #065f46; }

    .chat-topbar-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 34px; height: 34px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
      font-family: var(--font);
      font-size: .75rem;
      font-weight: 600;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-wrap {
      display: flex;
      gap: 10px;
      animation: msgIn .25s ease;
    }

    .msg-wrap.user { flex-direction: row-reverse; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-wrap.ai   .msg-avatar { background: var(--accent); color: #fff; }
    .msg-wrap.user .msg-avatar { background: var(--primary); color: #fff; }

    .msg-content { max-width: 72%; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: .875rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .msg-wrap.ai   .msg-bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .msg-wrap.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 5px;
      padding: 0 4px;
    }

    .msg-wrap.user .msg-time { text-align: right; }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input Area */
    .chat-input-wrap {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
    }

    .chat-input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s, box-shadow .2s;
    }

    .chat-input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }

    .chat-textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: .875rem;
      font-family: var(--font);
      color: var(--text);
      background: transparent;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
    }

    .chat-textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s, transform .15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Welcome State */
    .welcome-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px; height: 64px;
      background: var(--accent-light);
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .welcome-state h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .welcome-state p { font-size: .875rem; color: var(--muted); max-width: 320px; }

    @media (max-width: 768px) {
      .mock-layout { grid-template-columns: 1fr; height: auto; }
      .mock-sidebar { display: none; }
      .chat-area { height: calc(100vh - 64px); }
      .msg-content { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-brand" href="../index.html">
    <div class="nav-brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
      </svg>
    </div>
    Hire<span>Walk</span>
  </a>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="location.href='browse.html'">Browse</button>
    <button class="nav-btn ghost" onclick="location.href='dashboard.html'">My Bookings</button>
    <button class="nav-btn filled" onclick="Auth.logout()">Logout</button>
  </div>
</nav>

<div class="mock-layout">

  <!-- ── Sidebar ── -->
  <div class="mock-sidebar">
    <div class="sidebar-top">
      <div class="ai-avatar-large">AI</div>
      <h3>AI Interview Assistant</h3>
      <p>Powered by Groq LLaMA 3.3</p>
      <div class="online-dot">Online & Ready</div>
    </div>

    <!-- Mode Switcher -->
    <div class="mode-section">
      <label>Mode</label>
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-interview" onclick="switchMode('interview')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Mock Interview
        </button>
        <button class="mode-tab" id="tab-qa" onclick="switchMode('qa')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ask Anything
        </button>
      </div>
    </div>

    <!-- Quick Prompts -->
    <div class="prompts-section">
      <label id="prompts-label">Quick Start</label>
      <div id="prompts-list"></div>
    </div>

    <!-- Stats -->
    <div class="sidebar-stats">
      <div class="stat-mini">
        <div class="val" id="stat-msgs">0</div>
        <div class="lbl">Messages</div>
      </div>
      <div class="stat-mini">
        <div class="val" id="stat-questions">0</div>
        <div class="lbl">Questions</div>
      </div>
      <div class="stat-mini">
        <div class="val" id="stat-mins">0</div>
        <div class="lbl">Minutes</div>
      </div>
    </div>
  </div>

  <!-- ── Chat Area ── -->
  <div class="chat-area">

    <!-- Topbar -->
    <div class="chat-topbar">
      <div class="chat-topbar-left">
        <span class="mode-badge interview" id="mode-badge">Mock Interview</span>
        <span style="font-size:.8rem;color:var(--muted)" id="session-label">Start a new session below</span>
      </div>
      <div class="chat-topbar-actions">
        <button class="icon-btn" onclick="resetChat()" title="New Session">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        </button>
        <button class="icon-btn" onclick="location.href='browse.html'" title="Browse Interviews">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-state" id="welcome-state">
        <div class="welcome-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <h3>Ready to help you prepare</h3>
        <p>Choose a quick prompt from the sidebar or type your message to get started</p>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="chat-input-box">
        <textarea
          class="chat-textarea"
          id="user-input"
          placeholder="Type your answer or ask a question..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>

  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  Auth.requireAuth('user');

  let messages   = [];
  let isLoading  = false;
  let currentMode = 'interview';
  let msgCount   = 0;
  let qCount     = 0;
  let startTime  = null;
  let timerInterval = null;

  const SYSTEMS = {
    interview: `You are an expert technical interviewer at a top tech company. Your job:
1. Greet the candidate warmly and ask what role they are preparing for.
2. Conduct a structured mock interview — ask ONE focused question at a time.
3. Mix technical questions (coding concepts, system design, tools) with behavioral ones (STAR method).
4. After each answer give brief 2-3 sentence feedback starting with "Feedback:".
5. Adapt difficulty based on answers.
6. After 5-6 exchanges give a final overall assessment with strengths and areas to improve.
Keep tone professional but encouraging.`,

    qa: `You are a helpful career and technical advisor for job seekers. You help candidates with:
- Career advice and interview tips
- Technical concepts (coding, cloud, DevOps, databases, etc.)
- Resume and profile guidance
- Salary negotiation tips
- Company research and preparation strategies
- Any doubts or questions about interviews, jobs, or tech topics
Be concise, friendly, and genuinely helpful. Answer questions directly and thoroughly.`
  };

  const PROMPTS = {
    interview: [
      'Start a mock interview for Software Engineer',
      'Practice for a DevOps Engineer role',
      'Mock interview for Data Analyst position',
      'Prepare for a Frontend Developer interview',
      'Interview practice for Cloud Engineer',
    ],
    qa: [
      'How do I answer "Tell me about yourself"?',
      'What are common system design questions?',
      'How to negotiate salary effectively?',
      'Explain microservices vs monolith',
      'Tips for cracking FAANG interviews',
      'How to prepare for behavioral interviews?',
    ]
  };

  function switchMode(mode) {
    currentMode = mode;
    messages    = [];
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('welcome-state') && showWelcome();

    document.getElementById('tab-interview').classList.toggle('active', mode === 'interview');
    document.getElementById('tab-qa').classList.toggle('active', mode === 'qa');

    const badge = document.getElementById('mode-badge');
    if (mode === 'interview') {
      badge.textContent = 'Mock Interview';
      badge.className   = 'mode-badge interview';
      document.getElementById('session-label').textContent = 'Interview practice session';
    } else {
      badge.textContent = 'Ask Anything';
      badge.className   = 'mode-badge qa';
      document.getElementById('session-label').textContent = 'General Q&A session';
    }

    renderPrompts();
    document.getElementById('user-input').placeholder =
      mode === 'interview'
        ? 'Type your answer here...'
        : 'Ask any career or technical question...';
  }

  function renderPrompts() {
    const list  = document.getElementById('prompts-list');
    const label = document.getElementById('prompts-label');
    label.textContent = currentMode === 'interview' ? 'Practice Roles' : 'Common Questions';
    list.innerHTML = PROMPTS[currentMode].map(p => `
      <button class="quick-prompt" onclick="usePrompt('${p.replace(/'/g, "\\'")}')">${p}</button>
    `).join('');
  }

  function usePrompt(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  function showWelcome() {
    const container = document.getElementById('chat-messages');
    container.innerHTML = `
      <div class="welcome-state" id="welcome-state">
        <div class="welcome-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <h3>${currentMode === 'interview' ? 'Ready to Interview You' : 'Ask Me Anything'}</h3>
        <p>${currentMode === 'interview'
          ? 'Choose a role from the sidebar or type what role you want to practice'
          : 'Ask any career advice, technical question, or interview tips'}</p>
      </div>`;
  }

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    renderMessage(role, content);
    msgCount++;
    if (role === 'assistant') qCount++;
    updateStats();
  }

  function renderMessage(role, content) {
    const container = document.getElementById('chat-messages');

    // Remove welcome state
    const welcome = document.getElementById('welcome-state');
    if (welcome) welcome.remove();

    const isAi  = role === 'assistant';
    const initials = isAi ? 'AI' : (Auth.get()?.name?.[0] || 'U');

    const div = document.createElement('div');
    div.className = `msg-wrap ${isAi ? 'ai' : 'user'}`;
    div.innerHTML = `
      <div class="msg-avatar">${initials}</div>
      <div class="msg-content">
        <div class="msg-bubble">${escapeHtml(content)}</div>
        <div class="msg-time">${timeNow()}</div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg-wrap ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-content">
        <div class="msg-bubble" style="padding:14px 18px">
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function updateStats() {
    document.getElementById('stat-msgs').textContent = msgCount;
    document.getElementById('stat-questions').textContent = qCount;
    if (startTime) {
      const mins = Math.floor((Date.now() - startTime) / 60000);
      document.getElementById('stat-mins').textContent = mins;
    }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text || isLoading) return;

    if (!startTime) {
      startTime = Date.now();
      timerInterval = setInterval(updateStats, 30000);
    }

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    isLoading = true;
    setInputState(false);
    addTyping();

    try {
      const resp = await fetch(`${API_BASE}/mock/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${Auth.token()}`
        },
        body: JSON.stringify({
          messages,
          mode: currentMode,
          system: SYSTEMS[currentMode]
        })
      });

      const data = await resp.json();
      removeTyping();

      if (!resp.ok) throw new Error(data.error || 'AI service error');
      addMessage('assistant', data.message);
    } catch (err) {
      removeTyping();
      renderMessage('assistant', `Sorry, I encountered an error: ${err.message}. Please try again.`);
    }

    isLoading = false;
    setInputState(true);
    document.getElementById('user-input').focus();
  }

  function resetChat() {
    messages  = [];
    msgCount  = 0;
    qCount    = 0;
    startTime = null;
    clearInterval(timerInterval);
    updateStats();
    document.getElementById('chat-messages').innerHTML = '';
    showWelcome();
  }

  function setInputState(enabled) {
    document.getElementById('send-btn').disabled    = !enabled;
    document.getElementById('user-input').disabled  = !enabled;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // Init
  renderPrompts();
</script>
</body>
</html>
