<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — HireWalk</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a class="auth-logo" href="../index.html">🚀 HireWalk</a>
    <h2>Create Your Account</h2>
    <p class="subtitle">Start your interview journey today</p>

    <div id="alert-box"></div>

    <div class="form-group">
      <label>Full Name *</label>
      <input class="form-control" id="name" type="text" placeholder="Your full name" />
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input class="form-control" id="email" type="email" placeholder="you@email.com" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Password *</label>
        <input class="form-control" id="password" type="password" placeholder="Min 6 chars" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input class="form-control" id="phone" type="tel" placeholder="+91 XXXXX" />
      </div>
    </div>
    <div class="form-group">
      <label>Skills (comma separated)</label>
      <input class="form-control" id="skills" placeholder="Java, Python, AWS, React..." />
    </div>

    <button class="btn btn-primary" style="width:100%;margin-top:8px" id="reg-btn" onclick="register()">
      Create Account
    </button>

    <p style="text-align:center;margin-top:20px;font-size:.875rem;color:var(--muted)">
      Already have an account? <a href="login.html" style="color:var(--accent);font-weight:600">Login</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  Auth.redirectIfLoggedIn();

  async function register() {
    const btn  = document.getElementById('reg-btn');
    const box  = document.getElementById('alert-box');
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const phone    = document.getElementById('phone').value.trim();
    const skills   = document.getElementById('skills').value.trim();

    if (!name || !email || !password) return showAlert(box, 'Please fill all required fields');

    setLoading(btn, true, 'Creating account...');
    try {
      const res = await Api.userRegister({ name, email, password, phone, skills });
      Auth.save(res.token, res.user);
      showAlert(box, 'Account created! Redirecting...', 'success');
      setTimeout(() => location.href = 'browse.html', 800);
    } catch (err) {
      showAlert(box, err.message);
    } finally {
      setLoading(btn, false);
    }
  }
</script>
</body>
</html>
